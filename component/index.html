<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 8px; }

  .drop-zone {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #ff4b4b;
    background: #fff5f5;
  }
  .drop-zone h3 { margin: 0 0 8px; color: #333; font-size: 16px; }
  .drop-zone p { margin: 0; color: #888; font-size: 13px; }

  .file-input { display: none; }

  .progress-area { margin-top: 12px; }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: #ff4b4b;
    width: 0%;
    transition: width 0.15s;
  }
  .status { font-size: 13px; color: #555; margin-top: 6px; }
  .summary { font-size: 13px; color: #0a7; font-weight: 600; margin-top: 8px; }
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <h3>이미지 파일을 드래그하거나 클릭하여 선택</h3>
  <p>PNG, JPG 파일 (Front / Back) — 브라우저에서 자동 압축 후 전송</p>
</div>
<input type="file" class="file-input" id="fileInput" multiple accept="image/png,image/jpeg">

<div class="progress-area" id="progressArea" style="display:none;">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status" id="statusText"></div>
  <div class="summary" id="summaryText"></div>
</div>

<script>
// ── Streamlit Component 통신 ──
function sendToStreamlit(data) {
  window.parent.postMessage({
    type: "streamlit:setComponentValue",
    value: data
  }, "*");
}

function setFrameHeight(h) {
  window.parent.postMessage({
    type: "streamlit:setFrameHeight",
    height: h
  }, "*");
}

// 초기 높이 설정
window.addEventListener("load", () => setFrameHeight(160));

// ── 설정 ──
const MAX_LONG_SIDE = 2000;
const JPEG_QUALITY = 0.90;

// ── UI 요소 ──
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const progressArea = document.getElementById("progressArea");
const progressFill = document.getElementById("progressFill");
const statusText = document.getElementById("statusText");
const summaryText = document.getElementById("summaryText");

// ── 이벤트 ──
dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener("change", (e) => handleFiles(e.target.files));

// ── 이미지 압축 ──
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;

      // 리사이즈
      if (Math.max(w, h) > MAX_LONG_SIDE) {
        if (w > h) {
          h = Math.round(h * MAX_LONG_SIDE / w);
          w = MAX_LONG_SIDE;
        } else {
          w = Math.round(w * MAX_LONG_SIDE / h);
          h = MAX_LONG_SIDE;
        }
      }

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);

      // JPEG로 변환
      canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = () => {
          resolve({
            name: file.name,
            data: reader.result.split(",")[1],  // base64 only (no prefix)
            size_original: file.size,
            size_compressed: blob.size
          });
        };
        reader.readAsDataURL(blob);
      }, "image/jpeg", JPEG_QUALITY);
    };
    img.src = URL.createObjectURL(file);
  });
}

// ── 파일 처리 ──
async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f =>
    f.type === "image/png" || f.type === "image/jpeg"
  );

  if (files.length === 0) {
    statusText.textContent = "이미지 파일이 없습니다.";
    return;
  }

  progressArea.style.display = "block";
  setFrameHeight(200);

  const results = [];
  let totalOriginal = 0;
  let totalCompressed = 0;

  for (let i = 0; i < files.length; i++) {
    statusText.textContent = `압축 중... ${i + 1}/${files.length} — ${files[i].name.substring(0, 40)}`;
    progressFill.style.width = `${((i + 1) / files.length) * 100}%`;

    const result = await compressImage(files[i]);
    results.push(result);
    totalOriginal += result.size_original;
    totalCompressed += result.size_compressed;
  }

  const savePct = ((1 - totalCompressed / totalOriginal) * 100).toFixed(0);
  const origMB = (totalOriginal / 1024 / 1024).toFixed(0);
  const compMB = (totalCompressed / 1024 / 1024).toFixed(1);

  statusText.textContent = `${files.length}개 이미지 압축 완료`;
  summaryText.textContent = `${origMB}MB → ${compMB}MB (${savePct}% 절감) — 서버로 전송 중...`;

  // Streamlit으로 전송
  sendToStreamlit(JSON.stringify(results));

  summaryText.textContent = `${origMB}MB → ${compMB}MB (${savePct}% 절감) — 전송 완료!`;
}
</script>
</body>
</html>
